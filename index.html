<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiaan Clothing</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:black;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
}

.hero{
    height:60vh;
    background:url('https://images.unsplash.com/photo-1441986300917-64674bd600d8') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:3rem;
    background:rgba(0,0,0,0.6);
    padding:15px;
}

.products{
    padding:40px;
}

.products h2{
    text-align:center;
    margin-bottom:30px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

button{
    background:black;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    margin-top:10px;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>
<body>

<header>
    <h1>KIAAN CLOTHING</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">New Arrivals</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Fresh Summer Collection 2026</h1>
</section>

<section class="products">
    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" alt="">
            <div class="card-content">
                <h3>Oversized T-Shirt</h3>
                <p>₹999</p>
                <button>Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542272604-787c3835535d" alt="">
            <div class="card-content">
                <h3>Baggy Jeans</h3>
                <p>₹1,999</p>
                <button>Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f" alt="">
            <div class="card-content">
                <h3>Summer Hoodie</h3>
                <p>₹2,499</p>
                <button>Add to Cart</button>
            </div>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Kiaan Clothing. All Rights Reserved.</p>
</footer>

</body>
</html>
