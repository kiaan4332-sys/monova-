<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOVA Streetwear</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#0b0b0b;
    color:white;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#a855f7;
}

.hero{
    padding:60px 20px;
    text-align:center;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
}

button{
    background:#a855f7;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.cart{
    padding:20px;
    background:#141414;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
    max-width:90%;
}
</style>
</head>

<body>

<header>
    <div class="logo">MONOVA</div>
    <p>Elevated Streetwear</p>
</header>

<section class="hero">
    <h1>Luxury Streetwear</h1>
    <p>Black & Purple Collection</p>
</section>

<section class="products">

    <div class="card">
        <h3>Oversized Tee</h3>
        <p>₹999</p>
        <button onclick="addToCart('Oversized Tee',999)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h3>Street Hoodie</h3>
        <p>₹2499</p>
        <button onclick="addToCart('Street Hoodie',2499)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h3>Cargo Pants</h3>
        <p>₹2999</p>
        <button onclick="addToCart('Cargo Pants',2999)">
            Add to Cart
        </button>
    </div>

</section>

<section class="cart">

    <h2>Shopping Cart</h2>

    <div id="cartItems"></div>

    <h3>Total: ₹<span id="total">0</span></h3>

    <h2>Checkout</h2>

    <input placeholder="Full Name"><br>
    <input placeholder="Email"><br>
    <input placeholder="Address"><br>

    <button onclick="checkout()">
        Place Order
    </button>

</section>

<script>

let cart =
JSON.parse(localStorage.getItem("monovaCart"))
|| [];

function saveCart(){
    localStorage.setItem(
        "monovaCart",
        JSON.stringify(cart)
    );
}

function addToCart(name,price){

    cart.push({
        name:name,
        price:price
    });

    saveCart();
    renderCart();
}

function removeItem(index){

    cart.splice(index,1);

    saveCart();
    renderCart();
}

function renderCart(){

    let items =
    document.getElementById("cartItems");

    let total = 0;

    items.innerHTML = "";

    cart.forEach((item,index)=>{

        total += item.price;

        items.innerHTML += `
        <p>
            ${item.name}
            - ₹${item.price}
            <button onclick="removeItem(${index})">
                Remove
            </button>
        </p>
        `;
    });

    document.getElementById("total")
    .innerText = total;
}

function checkout(){

    if(cart.length === 0){

        alert("Cart is empty!");

        return;
    }

    alert(
        "Demo order placed!\n\nConnect Razorpay and Firebase for real payments."
    );

    cart = [];

    saveCart();

    renderCart();
}

renderCart();

</script>

</body>
</html>
