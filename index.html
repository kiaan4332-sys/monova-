<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOVA Streetwear</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#fff;
    color:#000;
}

header{
    background:#000;
    color:#fff;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    height:80vh;
    background:url('https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero-content{
    background:rgba(0,0,0,0.7);
    color:white;
    padding:30px;
    border-radius:10px;
}

.hero-content h1{
    font-size:60px;
}

.hero-content p{
    margin-top:10px;
}

.shop{
    padding:60px 8%;
}

.shop h2{
    text-align:center;
    margin-bottom:40px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    font-size:20px;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:black;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

.cart{
    background:#f4f4f4;
    padding:50px 8%;
}

.cart h2{
    margin-bottom:20px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.total{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<header>
    <div class="logo">MONOVA</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Cart</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>MONOVA</h1>
        <p>Premium Streetwear Collection</p>
    </div>
</section>

<section class="shop">

<h2>Featured Collection</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3>Oversized Tee</h3>
<p class="price">₹999</p>
<button onclick="addToCart('Oversized Tee',999)">
Add To Cart
</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3>Street Hoodie</h3>
<p class="price">₹2499</p>
<button onclick="addToCart('Street Hoodie',2499)">
Add To Cart
</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3>Cargo Pants</h3>
<p class="price">₹2999</p>
<button onclick="addToCart('Cargo Pants',2999)">
Add To Cart
</button>
</div>
</div>

</div>

</section>

<section class="cart">

<h2>Shopping Cart</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

</section>

<footer>
© 2026 MONOVA Streetwear
</footer>

<script>

let cart=[];

function addToCart(name,price){

cart.push({
name:name,
price:price
});

updateCart();
}

function removeItem(index){

cart.splice(index,1);

updateCart();
}

function updateCart(){

let cartItems =
document.getElementById("cartItems");

cartItems.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

cartItems.innerHTML+=`

<div class="cart-item">

<span>
${item.name}
- ₹${item.price}
</span>

<button onclick="removeItem(${index})">
Remove
</button>

</div>

`;

});

document.getElementById("total").innerText=total;

}

</script>

</body>
</html>
